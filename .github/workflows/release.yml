name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          # Both darwin targets build on arm64 runners (macos-latest) —
          # macos-13 Intel runners are heavily queued. Apple Silicon hosts
          # cross-compile x86_64 via `rustup target add` at zero cost.
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: .exe

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile deps (aarch64-linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          # Override the repo's .cargo/config.toml (which pins `gcc` for native
          # aarch64 hosts) with the cross-compiler when building from x86_64 CI.
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          bin="cch${{ matrix.ext }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/$bin" "dist/$bin"
          cd dist
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            7z a "cch-${{ matrix.target }}.zip" "$bin"
          else
            tar czf "cch-${{ matrix.target }}.tar.gz" "$bin"
          fi
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: cch-${{ matrix.target }}
          path: dist/cch-${{ matrix.target }}.*

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List artifacts
        run: ls -la artifacts
      - name: Compute SHA-256 sums
        run: |
          cd artifacts
          # Basename-only, sorted output. Maintainer pastes these into
          # npm/package.json "checksums" before `npm publish`.
          sha256sum cch-* | sort -k2 > sha256sums.txt
          cat sha256sums.txt
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/cch-*
            artifacts/sha256sums.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
